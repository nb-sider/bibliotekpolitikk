name: Ukentlig oppdatering

on:
  schedule:
    - cron: "0 4 * * 1"   # mandag kl. 04:00 UTC (05:00/06:00 norsk tid)
  workflow_dispatch:        # gjør det mulig å kjøre manuelt fra Actions-fanen

permissions:
  contents: write

jobs:
  oppdater:
    runs-on: ubuntu-latest
    steps:
      - name: Hent repo
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer avhengigheter
        run: pip install -r requirements.txt

      - name: Kjør scraper (inkrementell)
        run: python bibliotekpolitikk_scraper.py

      - name: Oppdater nettsiden
        run: cp dashboard.html index.html

      - name: Commit og push endringer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Ukentlig oppdatering $(date +%F)"
          git push
